<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARTI | Project</title>
  <meta
    name="description"
    content="PARTI project page."
  >
  <script>
    (() => {
      const storedTheme = window.localStorage.getItem("parti-theme");
      const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css?v=20260410g">
</head>
<body>
  <div class="project-page-shell" data-theme="dark" id="project-page-shell">
    <header class="site-header">
      <button class="menu-button" id="menu-button" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a class="brand-link" href="index.html" aria-label="PARTI home">
        <img class="logo-image header-logo-image" id="header-logo-image" src="assets/parti-logo-purple.png" alt="PARTI">
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">Mode</button>
    </header>

    <aside class="site-menu" id="site-menu">
      <nav class="menu-panel" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="index.html#works">Works</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </aside>

    <main class="project-main">
      <section class="project-visual" aria-label="Project image">
        <div class="project-hero-card">
          <div class="project-hero-slides" id="project-hero-slides"></div>
          <div class="project-hero-overlay">
            <p id="project-hero-copy"></p>
            <div class="project-hero-dots" id="project-hero-dots" aria-label="Project slideshow navigation"></div>
          </div>
        </div>
      </section>

      <section class="project-copy-grid">
        <article class="project-block">
          <p class="detail-kicker" id="project-page-kicker">Project</p>
          <h1 id="project-page-title">PARTI Project</h1>
          <p class="detail-meta" id="project-page-meta"></p>
        </article>
        <article class="project-block">
          <h2>Overview</h2>
          <p class="detail-copy" id="project-page-lead"></p>
          <p class="detail-copy" id="project-page-body"></p>
          <p class="detail-copy" id="project-page-support"></p>
        </article>
        <article class="project-block">
          <h2>Gallery</h2>
          <div class="project-gallery" id="project-gallery"></div>
        </article>
        <article class="project-block">
          <h2>Project Links</h2>
          <div class="project-actions">
            <a class="project-link" href="index.html#works">Back to Works</a>
            <a class="project-link" id="project-live-link" href="https://www.instagram.com/letsparti.co/" target="_blank" rel="noreferrer">View Source Post</a>
          </div>
        </article>
        <article class="project-block">
          <h2>Selected Works</h2>
          <div class="project-list" id="project-list"></div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <a href="index.html#works">Back to Works</a>
      <a href="contact.html">hello@letsparti.co</a>
      <a class="admin-footer-link" href="admin-login.html" aria-label="PARTI admin login">Admin Login</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260410i"></script>
  <script src="supabase-client.js?v=20260410i"></script>
  <script src="project-data.js?v=20260410i"></script>
  <script src="project-store.js?v=20260410i"></script>
  <script src="project-page.js?v=20260410i"></script>
</body>
</html>
